<div class="login-container">
  <div class="login-card">

    <div class="brand">
      <div class="brand-icon">
        <mat-icon>work_outline</mat-icon>
      </div>
      <h2 class="brand-name">Resume Screener</h2>
      <p class="brand-sub">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">mail_outline</mat-icon>
          <input
            type="email"
            class="form-input"
            formControlName="email"
            placeholder="you@example.com">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">lock_outline</mat-icon>
          <input
            type="password"
            class="form-input"
            formControlName="password"
            placeholder="••••••••">
        </div>
      </div>

      <div class="error-box" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <mat-spinner *ngIf="isLoading" diameter="16"></mat-spinner>
        <span>{{ isLoading ? 'Signing in...' : 'Sign in' }}</span>
      </button>

    </form>

  </div>
</div>
