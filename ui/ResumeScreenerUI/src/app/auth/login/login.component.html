<div class="login-container">

  <div class="login-card">

    <h2>Resume Screener</h2>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()">

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          formControlName="email">

      </div>

      <div class="form-group">

        <label>Password</label>

        <input
          type="password"
          formControlName="password">

      </div>

      <button
        type="submit"
        [disabled]="isLoading">

        {{
          isLoading
            ? 'Logging in...'
            : 'Login'
        }}

      </button>

      <p
        class="error"
        *ngIf="errorMessage">

        {{ errorMessage }}

      </p>

    </form>

  </div>

</div>
