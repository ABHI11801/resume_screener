<div class="jobs-page">

  <div class="jobs-header">
    <div>
      <p class="section-label">Manage</p>
      <h2 class="section-title">Jobs</h2>
    </div>
    <button class="add-job-btn" (click)="openAddJobDialog()">
      <mat-icon>add</mat-icon>
      Add Job
    </button>
  </div>

  <div class="jobs-grid" *ngIf="jobs.length > 0">
    <div class="job-card" *ngFor="let job of jobs">

      <div class="job-card-header">
        <div class="job-icon">
          <mat-icon>work_outline</mat-icon>
        </div>
        <span class="status-badge" [ngClass]="job.status | lowercase">
          {{ job.status }}
        </span>
      </div>

      <h3 class="job-title">{{ job.title }}</h3>
      <p class="job-dept">
        <mat-icon class="meta-icon">corporate_fare</mat-icon>
        {{ job.department }}
      </p>

      <div class="job-meta">
        <div class="meta-item">
          <span class="meta-label">Min. score</span>
          <span class="meta-value">{{ job.minimumScore }}</span>
        </div>
      </div>

      <button class="view-btn" [routerLink]="['/jobs', job.id]">
        View candidates
        <mat-icon class="btn-icon">arrow_forward</mat-icon>
      </button>

    </div>
  </div>

  <div class="empty-state" *ngIf="jobs.length === 0">
    <mat-icon>work_off</mat-icon>
    <p>No jobs found</p>
    <span>Add your first job to get started</span>
  </div>

</div>
