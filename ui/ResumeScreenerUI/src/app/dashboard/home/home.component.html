<mat-toolbar class="app-toolbar">
  <div class="toolbar-brand">
    <mat-icon class="brand-icon">work_outline</mat-icon>
    <span class="brand-name">Resume Screener</span>
  </div>
  <span class="spacer"></span>
  <button mat-button class="logout-btn" (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-toolbar>

<mat-sidenav-container class="layout-container">

  <mat-sidenav mode="side" opened class="app-sidenav">
    <div class="nav-section-label">Main Menu</div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/jobs" routerLinkActive="active-link">
        <mat-icon matListItemIcon>work</mat-icon>
        <span matListItemTitle>Jobs</span>
      </a>
      <a mat-list-item routerLink="/rankings" routerLinkActive="active-link">
        <mat-icon matListItemIcon>leaderboard</mat-icon>
        <span matListItemTitle>Rankings</span>
      </a>
      <a mat-list-item routerLink="/interviews" routerLinkActive="active-link">
        <mat-icon matListItemIcon>event_note</mat-icon>
        <span matListItemTitle>Interviews</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
